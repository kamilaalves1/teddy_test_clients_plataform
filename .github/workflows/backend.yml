name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'back-end/**'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    branches: [main, develop]
    paths:
      - 'back-end/**'
      - 'package.json'
      - 'package-lock.json'

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-checks:
    name: Backend checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx nx lint back-end --quiet

      - name: Type check
        run: npx tsc -p back-end/tsconfig.app.json --noEmit

      - name: Unit tests
        run: npm run test:api -- --coverage
        env:
          NODE_ENV: test

      - name: Build
        run: npm run build:api

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: backend-checks
    if: github.event_name == 'push'
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: back-end/Dockerfile
          push: false
          tags: teddy-client-manager-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  smoke-tests:
    name: Backend smoke tests
    runs-on: ubuntu-latest
    needs: backend-checks
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: teddy_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d teddy_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      HOST: 127.0.0.1
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: teddy_db
      DB_SYNC: true
      JWT_SECRET: integration-test-secret
      JWT_EXPIRES_IN: 1d
      PORT: 3000
      NODE_ENV: test
      OTEL_ENABLED: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build backend
        run: npm run build:api

      - name: Start API
        run: npm run start:api &

      - name: Wait for API
        run: |
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:3000/healthz && break || sleep 2
          done

      - name: Exercise auth and clients flow
        run: |
          curl -fsS -X POST http://127.0.0.1:3000/v1/auth/register \
            -H 'Content-Type: application/json' \
            -d '{"name":"Workflow User","email":"workflow@test.com","password":"CiTest@123"}' \
            -o /tmp/register_response.json

          TOKEN=$(cat /tmp/register_response.json | python3 -c "import json,sys; print(json.load(sys.stdin)['access_token'])")

          curl -fsS -X POST http://127.0.0.1:3000/v1/auth/login \
            -H 'Content-Type: application/json' \
            -d '{"email":"workflow@test.com","password":"CiTest@123"}'

          curl -fsS http://127.0.0.1:3000/v1/clients \
            -H "Authorization: Bearer $TOKEN"
