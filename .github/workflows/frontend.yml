name: Frontend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'front-end/**'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    branches: [main, develop]
    paths:
      - 'front-end/**'
      - 'package.json'
      - 'package-lock.json'

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend-checks:
    name: Frontend checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx nx lint front-end --quiet

      - name: Type check
        run: npx tsc -p front-end/tsconfig.json --noEmit

      - name: Unit tests
        run: npm run test:web -- --coverage

      - name: Build
        run: npm run build:web

  e2e-tests:
    name: Frontend E2E
    runs-on: ubuntu-latest
    needs: frontend-checks
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: teddy_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d teddy_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      HOST: 127.0.0.1
      PORT: 3000
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: teddy_db
      DB_SYNC: true
      JWT_SECRET: e2e-test-secret-key
      JWT_EXPIRES_IN: 1d
      OTEL_ENABLED: false
      PLAYWRIGHT_FRONTEND_PORT: 4173
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E suite
        run: npm run test:e2e

      - name: Upload E2E report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 7

      - name: Upload E2E results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-results
          path: test-results
          retention-days: 7
